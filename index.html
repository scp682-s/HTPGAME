<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>房树人拼图游戏 - 手机版</title>
    
    <!-- Vercel Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 页面容器 */
        .page {
            display: none;
            min-height: 100vh;
            padding: 15px;
            flex-direction: column;
        }
        .page.active {
            display: flex;
        }

        /* ==================== 第一页：主界面 ==================== */
        .page-home {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .home-header {
            color: white;
            margin-bottom: 30px;
        }
        .home-header h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .home-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .home-card {
            background: white;
            border-radius: 20px;
            padding: 25px 20px;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            margin-bottom: 25px;
        }
        .home-card h2 {
            color: #667eea;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .steps-list {
            text-align: left;
            list-style: none;
        }
        .steps-list li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: #444;
            line-height: 1.5;
        }
        .step-number {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .start-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 50px;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ==================== 第二页：拼图控制 ==================== */
        .page-control {
            padding-top: 60px;
        }

        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.95);
            color: #667eea;
            border: none;
            padding: 10px 16px;
            font-size: 0.9rem;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 100;
        }

        .control-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            height: 700px;
            display: flex;
            flex-direction: column;
        }

        .control-panel h2 {
            color: #333;
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        /* 图片选择区域 */
        .image-selector {
            border: 3px dashed #ccc;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            background: #fafafa;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        .image-selector.has-image {
            border-style: solid;
            border-color: #667eea;
            background: #fff;
        }
        .placeholder-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .placeholder-text {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 5px;
        }
        .select-image-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 10px;
        }
        #previewImage {
            max-width: 100%;
            max-height: 180px;
            border-radius: 10px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        /* 难度选择 */
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .control-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        /* 难度词条 */
        .difficulty-modifiers {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f5 100%);
            border: 1px solid #ffb6c1;
            border-radius: 8px;
            margin-top: 10px;
        }
        .mod-opt {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .mod-opt:active {
            background: #ffe4ec;
        }
        .mod-opt input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #d63384;
        }

        /* 按钮组 */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }
        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-warning {
            background: #ff9800;
            color: white;
        }
        .btn:disabled {
            opacity: 0.5;
        }

        /* ==================== 图片选择弹窗 ==================== */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .image-modal.active {
            display: flex;
        }
        .image-modal-content {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 350px;
            width: 100%;
        }
        .image-modal h3 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        .disclaimer-text {
            font-size: 0.7rem;
            color: #999;
            text-align: center;
            margin: 10px 0;
            line-height: 1.4;
        }
        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .image-option {
            border: 3px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
        }
        .image-option:active {
            border-color: #667eea;
            transform: scale(0.98);
        }
        .image-option img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        .close-modal-btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .custom-image-btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        /* ==================== 第三页：游戏界面 ==================== */
        .page-game {
            padding-top: 60px;
        }

        .game-panel {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            height: 700px;
            display: flex;
            flex-direction: column;
        }

        .puzzle-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            padding: 12px;
            overflow: auto;
        }
        .puzzle-area h3 {
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-align: center;
        }

        /* 碎片容器 */
        .pieces-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            min-height: 70px;
            max-height: 160px;
            overflow-y: auto;
            padding: 8px;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            margin-bottom: 6px;
        }
        .piece-item {
            width: 50px;
            height: 50px;
            background-size: cover;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            border: 2px solid transparent;
        }
        .piece-item.selected {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        .piece-item.dragging {
            opacity: 0.5;
        }

        /* 拖动时的浮动碎片 */
        .drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            border-radius: 6px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border: 2px solid #667eea;
            transform: translate(-50%, -50%) scale(1.1);
            transition: transform 0.1s;
        }

        /* 格子拖动悬停效果 */
        .grid-cell.drag-over {
            background: rgba(102, 126, 234, 0.2);
            border: 2px solid #667eea !important;
        }

        /* 网格容器 */
        .grid-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .grid-container {
            display: grid;
            gap: 0;
        }
        .grid-cell {
            background: white;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            border: 1px dashed #ccc;
            position: relative;
        }
        .grid-cell:has(.puzzle-piece) {
            border: none;
        }
        .grid-cell.correct {
            outline: 3px solid #10b981;
            outline-offset: -2px;
        }
        .puzzle-piece {
            width: 100%;
            height: 100%;
            background-size: 100% 100%;
        }
        .puzzle-piece.dragging {
            opacity: 0.5;
        }
        .puzzle-piece.selected {
            outline: 3px solid #667eea;
            outline-offset: -2px;
        }

        .game-hint {
            text-align: center;
            padding: 30px 15px;
            color: #888;
            font-size: 0.9rem;
        }
        .game-hint .hint-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* 游戏底部按钮 */
        .game-bottom-btns {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: white;
        }
        .game-bottom-btns .btn {
            flex: 1;
            padding: 12px 10px;
            font-size: 0.9rem;
        }

        /* 提示信息 */
        .game-message {
            text-align: center;
            padding: 10px;
            background: white;
            color: #667eea;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* ==================== 第四页：完成页面 ==================== */
        .page-complete {
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .complete-card {
            background: white;
            border-radius: 20px;
            padding: 30px 25px;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .complete-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .complete-card h2 {
            color: #10b981;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }
        .complete-stats {
            margin-bottom: 25px;
        }
        .complete-stats p {
            color: #555;
            font-size: 1rem;
            margin-bottom: 8px;
        }
        .complete-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .complete-btns .btn {
            width: 100%;
        }

        /* ==================== 新手教程样式 ==================== */
        .tutorial-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
        }
        .tutorial-overlay.active {
            display: block;
        }
        .tutorial-tip {
            position: fixed;
            background: white;
            color: #333;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            font-size: 0.95rem;
            max-width: 280px;
            z-index: 10001;
            text-align: center;
        }
        .tutorial-highlight {
            position: relative;
            z-index: 10000 !important;
            box-shadow: 0 0 0 4px #667eea, 0 0 20px rgba(102, 126, 234, 0.5) !important;
        }

        /* 右上角按钮组 */
        .top-right-btns {
            position: fixed;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }
        .top-right-btns .back-btn {
            position: static;
        }

        /* 音乐控制区域 */
        .music-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        .music-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .music-btn.active {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 音乐浮层 */
        .music-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .music-overlay.active {
            display: block;
        }
        .music-panel {
            display: none;
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: white;
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            width: 320px;
            max-width: calc(100vw - 40px);
            max-height: 550px;
            z-index: 1001;
            overflow: hidden;
        }
        .music-panel.active {
            display: flex;
            flex-direction: column;
        }
        .music-panel iframe {
            width: 100%;
            height: 300px;
            border: none;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }
        
        /* 本地播放器 */
        .local-player {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
        }
        .player-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            cursor: pointer;
            color: white;
        }
        .player-info:active {
            opacity: 0.8;
        }
        .song-name {
            font-size: 0.9rem;
            font-weight: 500;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 8px;
        }
        .toggle-playlist {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: space-around;
            gap: 8px;
            margin-bottom: 8px;
        }
        .control-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .control-btn:active {
            background: rgba(255,255,255,0.4);
            transform: scale(0.95);
        }
        .control-btn.play-pause {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.9);
            color: #667eea;
            font-size: 1.2rem;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            margin-bottom: 6px;
        }
        .progress-fill {
            height: 100%;
            background: white;
            width: 0%;
            transition: width 0.1s linear;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.8);
        }
        
        /* 播放列表 */
        .playlist {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            margin-top: 8px;
        }
        .playlist.active {
            max-height: 150px;
            overflow-y: auto;
        }
        .playlist-item {
            padding: 10px 12px;
            color: white;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .playlist-item:last-child {
            border-bottom: none;
        }
        .playlist-item:active {
            background: rgba(255,255,255,0.2);
        }
        .playlist-item.active {
            background: rgba(255,255,255,0.15);
            font-weight: 500;
        }
        .playlist-item .index {
            opacity: 0.7;
            min-width: 20px;
        }

        /* 原图预览弹窗 */
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .preview-modal.active {
            display: flex;
        }
        .preview-modal img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 10px;
        }
        .preview-modal .close-preview {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* 问卷弹窗 */
        .survey-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        .survey-modal.active {
            display: flex;
        }
        .survey-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .survey-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-survey {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-survey:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <!-- ==================== 第一页：主界面 ==================== -->
    <div class="page page-home active" id="pageHome">
        <div class="home-header">
            <h1>🏠🌳🧑 房树人拼图游戏</h1>
            <p>有趣的图片拼图益智游戏</p>
        </div>
        
        <div class="home-card">
            <h2>📖 游戏玩法</h2>
            <ul class="steps-list">
                <li>
                    <span class="step-number">1</span>
                    <span>选择一张房树人图片</span>
                </li>
                <li>
                    <span class="step-number">2</span>
                    <span>选择拼图难度（2×2 到 6×6）</span>
                </li>
                <li>
                    <span class="step-number">3</span>
                    <span>点击「生成拼图」开始游戏</span>
                </li>
                <li>
                    <span class="step-number">4</span>
                    <span>点按碎片和格子进行放置</span>
                </li>
                <li>
                    <span class="step-number">5</span>
                    <span>完成拼图即可通关！</span>
                </li>
            </ul>
        </div>
        
        <button class="start-btn" id="startBtn">
            <span>🎮</span>

    <script>
        // ==================== 页面切换 ====================
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        document.getElementById('startBtn').addEventListener('click', () => showPage('pageControl'));
        document.getElementById('backToHome').addEventListener('click', () => showPage('pageHome'));
        document.getElementById('backToControl').addEventListener('click', () => showPage('pageControl'));
        document.getElementById('playAgainBtn').addEventListener('click', () => {
            showPage('pageControl');
            window.puzzleGame.resetGame();
        });
        document.getElementById('backHomeBtn').addEventListener('click', () => showPage('pageHome'));

        // ==================== 问卷弹窗 ====================
        const surveyModal = document.getElementById('surveyModal');
        document.getElementById('surveyBtn').addEventListener('click', () => {
            surveyModal.classList.add('active');
        });
        document.getElementById('closeSurvey').addEventListener('click', () => {
            surveyModal.classList.remove('active');
        });
        surveyModal.addEventListener('click', (e) => {
            if (e.target === surveyModal) surveyModal.classList.remove('active');
        });

        // ==================== 图片选择弹窗 ====================
        const imageList = [
            { name: '图片1', file: 'photo/1.png' },
            { name: '图片2', file: 'photo/2.png' },
            { name: '图片3', file: 'photo/3.jpg' },
            { name: '图片4', file: 'photo/4.jpg' }
        ];

        const imageModal = document.getElementById('imageModal');
        const imageGrid = document.getElementById('imageGrid');
        const selectImageBtn = document.getElementById('selectImageBtn');
        const imageSelector = document.getElementById('imageSelector');
        const closeModal = document.getElementById('closeModal');

        // 生成图片选项
        imageList.forEach((img, index) => {
            const option = document.createElement('div');
            option.className = 'image-option';
            option.innerHTML = `<img src="${img.file}" alt="${img.name}">`;
            option.addEventListener('click', () => selectImage(img.file));
            imageGrid.appendChild(option);
        });

        selectImageBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            imageModal.classList.add('active');
        });
        imageSelector.addEventListener('click', () => {
            imageModal.classList.add('active');
        });
        closeModal.addEventListener('click', () => {
            imageModal.classList.remove('active');
        });

        // 自定义图片上传
        const customImageBtn = document.getElementById('customImageBtn');
        const customImageInput = document.getElementById('customImageInput');

        customImageBtn.addEventListener('click', () => {
            customImageInput.click();
        });

        customImageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    selectImage(event.target.result);
                };
                reader.readAsDataURL(file);
                imageModal.classList.remove('active');
            }
        });

        function selectImage(src) {
            imageModal.classList.remove('active');
            const previewImage = document.getElementById('previewImage');
            const placeholderContent = document.getElementById('placeholderContent');
            
            const img = new Image();
            img.onload = function() {
                window.puzzleGame.originalImage = img;
                previewImage.src = src;
                previewImage.style.display = 'block';
                placeholderContent.style.display = 'none';
                selectImageBtn.textContent = '🔄 重新选择';
                imageSelector.classList.add('has-image');
                document.getElementById('generateBtn').disabled = false;
            };
            img.src = src;
        }

        // ==================== 难度词条更新 ====================
        document.getElementById('gridSize').addEventListener('change', updateDifficultyModifiers);
        
        function updateDifficultyModifiers() {
            const gridSize = parseInt(document.getElementById('gridSize').value);
            const container = document.getElementById('difficultyModifiers');
            const rotationMod = document.getElementById('modifierRotation');
            const hiddenMod = document.getElementById('modifierHidden');
            const tricksterMod = document.getElementById('modifierTrickster');
            
            if (gridSize < 3) {
                container.style.display = 'none';
                return;
            }
            
            container.style.display = 'flex';
            rotationMod.style.display = gridSize >= 3 ? 'flex' : 'none';
            hiddenMod.style.display = gridSize >= 4 ? 'flex' : 'none';
            tricksterMod.style.display = gridSize >= 5 ? 'flex' : 'none';
            
            // 更新提示
            const tricksterCount = gridSize >= 6 ? 5 : '1~3';
            tricksterMod.title = `在随机时段随机移动${tricksterCount}个拼图碎片`;
        }
        updateDifficultyModifiers();

        // ==================== 拼图游戏类 ====================
        class PuzzleGame {
            constructor() {
                this.originalImage = null;
                this.gridSize = 3;
                this.pieceData = [];
                this.cells = [];
                this.gameState = 'waiting';
                this.moveCount = 0;
                this.startTime = null;
                this.timerInterval = null;
                this.selectedPiece = null;
                this.selectedCell = null;
                
                // 难度词条
                this.modifiers = { rotation: false, hidden: false, trickster: false };
                this.rotatedPieces = [];
                this.hiddenPieces = [];
                this.tricksterTriggered = false;
                
                // 拖动相关
                this.isDragging = false;
                this.dragGhost = null;
                this.dragSource = null;
                this.dragStartPos = { x: 0, y: 0 };
                this.dragThreshold = 10; // 拖动阈值，超过此距离才算拖动
                this.dragFromGrid = false; // 标记是否从格子内拖动
                
                // DOM元素
                this.gridContainer = document.getElementById('gridContainer');
                this.piecesContainer = document.getElementById('piecesContainer');
                this.gameHint = document.getElementById('gameHint');
                this.messageEl = document.getElementById('message');
                
                this.initEvents();
            }
            
            initEvents() {
                document.getElementById('generateBtn').addEventListener('click', () => {
                    this.gridSize = parseInt(document.getElementById('gridSize').value);
                    this.generatePuzzle();
                    showPage('pageGame');
                });

                document.getElementById('reshuffleBtn').addEventListener('click', () => this.shufflePieces());
                document.getElementById('rotateBtn').addEventListener('click', () => this.rotateSelectedPiece());
                document.getElementById('solveBtn').addEventListener('click', () => this.solvePuzzle());
            }
            
            resetGame() {
                this.gameState = 'waiting';
                this.moveCount = 0;
                this.selectedPiece = null;
                this.selectedCell = null;
                this.gridContainer.innerHTML = '';
                this.piecesContainer.innerHTML = '<span style="color: #aaa; font-size: 0.85rem;">生成拼图后显示碎片</span>';
                this.gameHint.style.display = 'block';
                this.gridContainer.style.display = 'none';
                document.getElementById('reshuffleBtn').disabled = true;
                document.getElementById('solveBtn').disabled = true;
                this.stopTimer();
            }
            
            generatePuzzle() {
                if (!this.originalImage) return;
                
                this.gameState = 'playing';
                this.moveCount = 0;
                this.startTime = Date.now();
                this.startTimer();
                this.selectedPiece = null;
                this.selectedCell = null;
                
                document.getElementById('reshuffleBtn').disabled = false;
                document.getElementById('solveBtn').disabled = false;

                // 读取难度词条
                this.modifiers.rotation = document.getElementById('enableRotation')?.checked || false;
                this.modifiers.hidden = document.getElementById('enableHidden')?.checked || false;
                this.modifiers.trickster = document.getElementById('enableTrickster')?.checked || false;
                this.rotatedPieces = [];
                this.hiddenPieces = [];
                this.tricksterTriggered = false;

                // 控制翻转按钮显示
                const rotateBtn = document.getElementById('rotateBtn');
                if (this.modifiers.rotation) {
                    rotateBtn.style.display = 'inline-block';
                    rotateBtn.disabled = true;
                } else {
                    rotateBtn.style.display = 'none';
                }
                
                // 清除旧内容
                this.gridContainer.innerHTML = '';
                this.piecesContainer.innerHTML = '';
                this.gameHint.style.display = 'none';
                this.gridContainer.style.display = 'grid';
                
                // 计算尺寸
                const imgWidth = this.originalImage.width;
                const imgHeight = this.originalImage.height;
                const imgRatio = imgWidth / imgHeight;
                
                // 手机端适配：最大宽度为屏幕宽度-40px
                const maxWidth = Math.min(window.innerWidth - 40, 360);
                const maxHeight = 400;
                
                let canvasWidth, canvasHeight;
                if (imgRatio >= 1) {
                    canvasWidth = maxWidth;
                    canvasHeight = canvasWidth / imgRatio;
                    if (canvasHeight > maxHeight) {
                        canvasHeight = maxHeight;
                        canvasWidth = canvasHeight * imgRatio;
                    }
                } else {
                    canvasHeight = maxHeight;
                    canvasWidth = canvasHeight * imgRatio;
                    if (canvasWidth > maxWidth) {
                        canvasWidth = maxWidth;
                        canvasHeight = canvasWidth / imgRatio;
                    }
                }
                
                this.gridContainer.style.width = canvasWidth + 'px';
                this.gridContainer.style.height = canvasHeight + 'px';
                
                // 绘制完整图片
                const fullCanvas = document.createElement('canvas');
                fullCanvas.width = canvasWidth;
                fullCanvas.height = canvasHeight;
                const ctx = fullCanvas.getContext('2d');
                ctx.drawImage(this.originalImage, 0, 0, canvasWidth, canvasHeight);
                
                // 设置网格
                this.gridContainer.style.gridTemplateColumns = `repeat(${this.gridSize}, 1fr)`;
                this.gridContainer.style.gridTemplateRows = `repeat(${this.gridSize}, 1fr)`;
                
                const pieceWidth = canvasWidth / this.gridSize;
                const pieceHeight = canvasHeight / this.gridSize;
                
                // 生成碎片数据
                this.pieceData = [];
                this.cells = [];
                
                for (let row = 0; row < this.gridSize; row++) {
                    for (let col = 0; col < this.gridSize; col++) {
                        const pieceCanvas = document.createElement('canvas');
                        pieceCanvas.width = pieceWidth;
                        pieceCanvas.height = pieceHeight;
                        const pieceCtx = pieceCanvas.getContext('2d');
                        pieceCtx.drawImage(
                            fullCanvas,
                            col * pieceWidth, row * pieceHeight, pieceWidth, pieceHeight,
                            0, 0, pieceWidth, pieceHeight
                        );
                        
                        this.pieceData.push({
                            id: `p-${row}-${col}`,
                            originalRow: row,
                            originalCol: col,
                            dataURL: pieceCanvas.toDataURL()
                        });
                    }
                }
                
                // 创建网格槽位
                for (let i = 0; i < this.gridSize * this.gridSize; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.dataset.row = Math.floor(i / this.gridSize);
                    cell.dataset.col = i % this.gridSize;
                    cell.addEventListener('click', (e) => this.onCellClick(e, cell));
                    this.gridContainer.appendChild(cell);
                    this.cells.push(cell);
                }
                
                // 打乱碎片
                const shuffled = [...this.pieceData].sort(() => Math.random() - 0.5);
                
                // 难度词条处理
                const totalPieces = shuffled.length;
                const rotationCount = this.gridSize >= 6 ? 3 : 1;
                const hiddenCount = this.gridSize >= 6 ? 4 : 1;
                
                if (this.modifiers.rotation) {
                    this.rotatedPieces = this.getRandomIndices(totalPieces, rotationCount);
                }
                if (this.modifiers.hidden) {
                    const available = Array.from({length: totalPieces}, (_, i) => i)
                        .filter(i => !this.rotatedPieces.includes(i));
                    this.hiddenPieces = this.getRandomIndices(available.length, hiddenCount)
                        .map(i => available[i]);
                }
                
                // 创建碎片
                shuffled.forEach((piece, index) => {
                    const pieceDiv = document.createElement('div');
                    pieceDiv.className = 'piece-item';
                    pieceDiv.style.backgroundImage = `url(${piece.dataURL})`;
                    pieceDiv.dataset.pieceId = piece.id;
                    pieceDiv.dataset.originalRow = piece.originalRow;
                    pieceDiv.dataset.originalCol = piece.originalCol;
                    
                    // 旋转
                    if (this.rotatedPieces.includes(index)) {
                        pieceDiv.style.transform = 'rotate(180deg)';
                        pieceDiv.dataset.rotated = 'true';
                    }
                    
                    // 隐藏
                    if (this.hiddenPieces.includes(index)) {
                        pieceDiv.style.display = 'none';
                        pieceDiv.dataset.hidden = 'true';
                    }

                    // 点击事件
                    pieceDiv.addEventListener('click', (e) => this.onPieceClick(e, pieceDiv));
                    
                    // 触摸拖动事件
                    this.bindDragEvents(pieceDiv);

                    this.piecesContainer.appendChild(pieceDiv);
                });
                
                // 捣蛋鬼
                if (this.modifiers.trickster) {
                    this.scheduleTrickster();
                }
                
                this.messageEl.textContent = '点按碎片，再点按格子放置';
            }
            
            getRandomIndices(total, count) {
                const indices = [];
                const available = Array.from({length: total}, (_, i) => i);
                for (let i = 0; i < Math.min(count, total); i++) {
                    const idx = Math.floor(Math.random() * available.length);
                    indices.push(available.splice(idx, 1)[0]);
                }
                return indices;
            }
            
            // 绑定拖动事件（碎片区碎片）
            bindDragEvents(pieceDiv) {
                pieceDiv.addEventListener('touchstart', (e) => this.onDragStart(e, pieceDiv, false), { passive: false });
                pieceDiv.addEventListener('touchmove', (e) => this.onDragMove(e), { passive: false });
                pieceDiv.addEventListener('touchend', (e) => this.onDragEnd(e), { passive: false });
            }
            
            // 绑定拖动事件（格子内碎片）
            bindPuzzlePieceDragEvents(pieceDiv) {
                pieceDiv.addEventListener('touchstart', (e) => this.onDragStart(e, pieceDiv, true), { passive: false });
                pieceDiv.addEventListener('touchmove', (e) => this.onDragMove(e), { passive: false });
                pieceDiv.addEventListener('touchend', (e) => this.onDragEnd(e), { passive: false });
            }
            
            // 拖动开始
            onDragStart(e, pieceDiv, isFromGrid = false) {
                if (this.gameState !== 'playing') return;
                
                const touch = e.touches[0];
                this.dragStartPos = { x: touch.clientX, y: touch.clientY };
                this.dragSource = pieceDiv;
                this.dragFromGrid = isFromGrid;
                this.isDragging = false;
                
                // 不立即阻止默认行为，让点击事件可以触发
                // 只在确定拖动时才阻止
            }
            
            // 拖动移动
            onDragMove(e) {
                if (!this.dragSource || this.gameState !== 'playing') return;
                
                const touch = e.touches[0];
                const dx = touch.clientX - this.dragStartPos.x;
                const dy = touch.clientY - this.dragStartPos.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // 超过阈值才开始拖动
                if (!this.isDragging && distance > this.dragThreshold) {
                    this.isDragging = true;
                    this.startDragVisual(touch);
                    e.preventDefault();
                }
                
                if (this.isDragging) {
                    e.preventDefault();
                    this.updateDragPosition(touch);
                    this.updateDragOverCell(touch);
                }
            }
            
            // 开始拖动视觉效果
            startDragVisual(touch) {
                // 创建浮动副本
                this.dragGhost = document.createElement('div');
                this.dragGhost.className = 'drag-ghost';
                this.dragGhost.style.backgroundImage = this.dragSource.style.backgroundImage;
                this.dragGhost.style.backgroundSize = 'cover';
                this.dragGhost.style.width = '60px';
                this.dragGhost.style.height = '60px';
                this.dragGhost.style.left = touch.clientX + 'px';
                this.dragGhost.style.top = touch.clientY + 'px';
                
                // 如果碎片是旋转的，也旋转副本
                if (this.dragSource.dataset.rotated === 'true') {
                    this.dragGhost.style.transform = 'translate(-50%, -50%) scale(1.1) rotate(180deg)';
                }
                
                document.body.appendChild(this.dragGhost);
                this.dragSource.classList.add('dragging');
                
                // 清除之前的选择
                this.clearSelection();
                this.messageEl.textContent = '拖动到目标格子放置';
            }
            
            // 更新拖动位置
            updateDragPosition(touch) {
                if (this.dragGhost) {
                    this.dragGhost.style.left = touch.clientX + 'px';
                    this.dragGhost.style.top = touch.clientY + 'px';
                }
            }
            
            // 更新拖动悬停的格子
            updateDragOverCell(touch) {
                // 清除所有格子的悬停效果
                this.cells.forEach(cell => cell.classList.remove('drag-over'));
                
                // 检测当前手指下的格子
                const targetCell = this.getCellAtPosition(touch.clientX, touch.clientY);
                if (targetCell) {
                    targetCell.classList.add('drag-over');
                }
            }
            
            // 获取指定位置的格子
            getCellAtPosition(x, y) {
                for (const cell of this.cells) {
                    const rect = cell.getBoundingClientRect();
                    if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                        return cell;
                    }
                }
                return null;
            }
            
            // 拖动结束
            onDragEnd(e) {
                if (!this.dragSource) return;
                
                // 清除所有格子的悬停效果
                this.cells.forEach(cell => cell.classList.remove('drag-over'));
                
                if (this.isDragging && this.dragGhost) {
                    // 确实发生了拖动
                    const touch = e.changedTouches[0];
                    const targetCell = this.getCellAtPosition(touch.clientX, touch.clientY);
                    
                    if (targetCell) {
                        if (this.dragFromGrid) {
                            // 从格子内拖动的碎片
                            const sourceCell = this.dragSource.parentElement;
                            if (sourceCell !== targetCell) {
                                // 模拟格子间交换
                                this.selectedCell = sourceCell;
                                this.swapGridPieces(sourceCell, targetCell);
                            }
                        } else {
                            // 从碎片区拖动的碎片
                            this.selectedPiece = this.dragSource;
                            const existingPiece = targetCell.querySelector('.puzzle-piece');
                            
                            if (existingPiece) {
                                this.swapWithCell(targetCell, existingPiece);
                            } else {
                                this.placeToCell(targetCell);
                            }
                        }
                    }
                    
                    // 清除拖动视觉
                    this.dragGhost.remove();
                    this.dragGhost = null;
                    this.dragSource.classList.remove('dragging');
                } else if (this.dragSource && !this.isDragging) {
                    // 没有拖动，是点击
                    if (this.dragFromGrid) {
                        // 点击格子内的碎片
                        this.handlePuzzlePieceClick(this.dragSource);
                    } else {
                        // 点击碎片区的碎片
                        this.handlePieceClick(this.dragSource);
                    }
                }
                
                this.isDragging = false;
                this.dragSource = null;
                this.dragFromGrid = false;
            }
            
            // 处理碎片点击（从touch事件调用）
            handlePieceClick(pieceDiv) {
                if (this.gameState !== 'playing') return;

                // 取消之前的选择
                this.clearSelection();

                // 选中当前碎片
                pieceDiv.classList.add('selected');
                this.selectedPiece = pieceDiv;
                this.messageEl.textContent = '请点按一个格子放置碎片';

                // 启用翻转按钮
                if (this.modifiers.rotation) {
                    document.getElementById('rotateBtn').disabled = false;
                }
            }
            
            // 处理格子内碎片点击（从touch事件调用）
            handlePuzzlePieceClick(pieceDiv) {
                if (this.gameState !== 'playing') return;

                // 取消之前的选择
                this.clearSelection();

                // 选中当前碎片
                pieceDiv.classList.add('selected');
                this.selectedPiece = pieceDiv;
                this.messageEl.textContent = '已选中格子内的碎片';

                // 启用翻转按钮
                if (this.modifiers.rotation) {
                    document.getElementById('rotateBtn').disabled = false;
                }
            }
            
            // 点击碎片
            onPieceClick(e, pieceDiv) {
                e.stopPropagation();
                if (this.gameState !== 'playing') return;
                
                // 如果刚刚完成拖动，不触发点击
                if (this.isDragging) return;

                // 取消之前的选择
                this.clearSelection();

                // 选中当前碎片
                pieceDiv.classList.add('selected');
                this.selectedPiece = pieceDiv;
                this.messageEl.textContent = '请点按一个格子放置碎片';

                // 启用翻转按钮
                if (this.modifiers.rotation) {
                    document.getElementById('rotateBtn').disabled = false;
                }
            }

            // 点击格子内的拼图碎片
            onPuzzlePieceClick(e, pieceDiv) {
                e.stopPropagation();
                if (this.gameState !== 'playing') return;

                // 取消之前的选择
                this.clearSelection();

                // 选中当前碎片
                pieceDiv.classList.add('selected');
                this.selectedPiece = pieceDiv;
                this.messageEl.textContent = '已选中格子内的碎片';

                // 启用翻转按钮
                if (this.modifiers.rotation) {
                    document.getElementById('rotateBtn').disabled = false;
                }
            }

            // 点击格子
            onCellClick(e, cell) {
                e.stopPropagation();
                if (this.gameState !== 'playing') return;
                
                const existingPiece = cell.querySelector('.puzzle-piece');
                
                if (this.selectedPiece) {
                    // 有选中的碎片，放置到格子
                    if (existingPiece) {
                        // 格子有碎片，交换
                        this.swapWithCell(cell, existingPiece);
                    } else {
                        // 格子为空，直接放置
                        this.placeToCell(cell);
                    }
                } else if (this.selectedCell) {
                    // 有选中的格子内碎片，进行格子间交换
                    this.swapGridPieces(this.selectedCell, cell);
                } else if (existingPiece) {
                    // 选中格子内的碎片
                    this.clearSelection();
                    existingPiece.classList.add('selected');
                    this.selectedCell = cell;
                    this.messageEl.textContent = '请点按另一个格子交换位置';
                }
            }
            
            // 格子间碎片交换
            swapGridPieces(sourceCell, targetCell) {
                const sourcePiece = sourceCell.querySelector('.puzzle-piece');
                const targetPiece = targetCell.querySelector('.puzzle-piece');
                
                if (!sourcePiece) return;
                
                // 保存源碎片数据
                const sourceData = {
                    bgImage: sourcePiece.style.backgroundImage,
                    originalRow: sourcePiece.dataset.originalRow,
                    originalCol: sourcePiece.dataset.originalCol,
                    pieceId: sourcePiece.dataset.pieceId,
                    rotated: sourcePiece.dataset.rotated
                };
                
                if (targetPiece) {
                    // 目标格子有碎片，交换
                    const targetData = {
                        bgImage: targetPiece.style.backgroundImage,
                        originalRow: targetPiece.dataset.originalRow,
                        originalCol: targetPiece.dataset.originalCol,
                        pieceId: targetPiece.dataset.pieceId,
                        rotated: targetPiece.dataset.rotated
                    };
                    
                    // 更新源碎片为目标数据
                    sourcePiece.style.backgroundImage = targetData.bgImage;
                    sourcePiece.dataset.originalRow = targetData.originalRow;
                    sourcePiece.dataset.originalCol = targetData.originalCol;
                    sourcePiece.dataset.pieceId = targetData.pieceId;
                    sourcePiece.dataset.rotated = targetData.rotated || 'false';
                    sourcePiece.style.transform = targetData.rotated === 'true' ? 'rotate(180deg)' : '';
                    
                    // 更新目标碎片为源数据
                    targetPiece.style.backgroundImage = sourceData.bgImage;
                    targetPiece.dataset.originalRow = sourceData.originalRow;
                    targetPiece.dataset.originalCol = sourceData.originalCol;
                    targetPiece.dataset.pieceId = sourceData.pieceId;
                    targetPiece.dataset.rotated = sourceData.rotated || 'false';
                    targetPiece.style.transform = sourceData.rotated === 'true' ? 'rotate(180deg)' : '';

                    this.updateAllCellsCorrect();
                } else {
                    // 目标格子为空，移动碎片
                    targetCell.appendChild(sourcePiece);
                    this.updateAllCellsCorrect();
                }

                this.moveCount++;
                this.clearSelection();
                this.messageEl.textContent = '点按碎片，再点按格子放置';
                this.checkCompletion();
            }
            
            // 放置碎片到空格子
            placeToCell(cell) {
                const bgImage = this.selectedPiece.style.backgroundImage;
                const originalRow = this.selectedPiece.dataset.originalRow;
                const originalCol = this.selectedPiece.dataset.originalCol;
                const pieceId = this.selectedPiece.dataset.pieceId;
                const rotated = this.selectedPiece.dataset.rotated;
                
                // 创建格子内碎片
                const newPiece = document.createElement('div');
                newPiece.className = 'puzzle-piece';
                newPiece.style.backgroundImage = bgImage;
                newPiece.dataset.originalRow = originalRow;
                newPiece.dataset.originalCol = originalCol;
                newPiece.dataset.pieceId = pieceId;
                if (rotated === 'true') {
                    newPiece.style.transform = 'rotate(180deg)';
                    newPiece.dataset.rotated = 'true';
                }

                // 添加点击事件以便选中和旋转
                newPiece.addEventListener('click', (e) => this.onPuzzlePieceClick(e, newPiece));
                
                // 添加拖动事件
                this.bindPuzzlePieceDragEvents(newPiece);

                cell.appendChild(newPiece);
                
                // 移除碎片区的碎片
                this.selectedPiece.remove();
                this.clearSelection();

                this.moveCount++;
                this.updateAllCellsCorrect();
                this.checkCompletion();
            }
            
            // 与格子内碎片交换
            swapWithCell(targetCell, existingPiece) {
                // 将现有碎片移回碎片区
                const newPieceItem = document.createElement('div');
                newPieceItem.className = 'piece-item';
                newPieceItem.style.backgroundImage = existingPiece.style.backgroundImage;
                newPieceItem.dataset.pieceId = existingPiece.dataset.pieceId;
                newPieceItem.dataset.originalRow = existingPiece.dataset.originalRow;
                newPieceItem.dataset.originalCol = existingPiece.dataset.originalCol;
                if (existingPiece.dataset.rotated === 'true') {
                    newPieceItem.style.transform = 'rotate(180deg)';
                    newPieceItem.dataset.rotated = 'true';
                }
                newPieceItem.addEventListener('click', (e) => this.onPieceClick(e, newPieceItem));
                this.bindDragEvents(newPieceItem);
                this.piecesContainer.appendChild(newPieceItem);
                
                existingPiece.remove();
                
                // 放置新碎片
                this.placeToCell(targetCell);
            }
            
            // 旋转碎片（双击）
            rotatePiece(e, pieceDiv) {
                e.stopPropagation();
                if (!this.modifiers.rotation) return;

                if (pieceDiv.dataset.rotated === 'true') {
                    pieceDiv.style.transform = 'rotate(0deg)';
                    pieceDiv.dataset.rotated = 'false';
                } else {
                    pieceDiv.style.transform = 'rotate(180deg)';
                    pieceDiv.dataset.rotated = 'true';
                }
                this.checkCompletion();
            }

            // 旋转选中的碎片（按钮）
            rotateSelectedPiece() {
                if (!this.modifiers.rotation || !this.selectedPiece) return;

                if (this.selectedPiece.dataset.rotated === 'true') {
                    this.selectedPiece.style.transform = 'rotate(0deg)';
                    this.selectedPiece.dataset.rotated = 'false';
                } else {
                    this.selectedPiece.style.transform = 'rotate(180deg)';
                    this.selectedPiece.dataset.rotated = 'true';
                }

                // 如果碎片在格子里，更新所有格子状态
                if (this.selectedPiece.classList.contains('puzzle-piece')) {
                    this.updateAllCellsCorrect();
                    this.checkCompletion();
                }
            }
            
            clearSelection() {
                document.querySelectorAll('.piece-item.selected, .puzzle-piece.selected').forEach(el => {
                    el.classList.remove('selected');
                });
                this.selectedPiece = null;
                this.selectedCell = null;

                // 禁用翻转按钮
                if (this.modifiers.rotation) {
                    document.getElementById('rotateBtn').disabled = true;
                }
            }
            
            updateCellCorrect(cell, originalRow, originalCol) {
                const cellRow = parseInt(cell.dataset.row);
                const cellCol = parseInt(cell.dataset.col);
                const piece = cell.querySelector('.puzzle-piece');
                const isRotated = piece?.dataset.rotated === 'true';

                if (parseInt(originalRow) === cellRow && parseInt(originalCol) === cellCol && !isRotated) {
                    cell.classList.add('correct');
                } else {
                    cell.classList.remove('correct');
                }
            }

            // 更新所有格子的正确状态
            updateAllCellsCorrect() {
                this.cells.forEach(cell => {
                    const piece = cell.querySelector('.puzzle-piece');
                    if (piece) {
                        this.updateCellCorrect(cell, piece.dataset.originalRow, piece.dataset.originalCol);
                    } else {
                        cell.classList.remove('correct');
                    }
                });
            }
            
            // 打乱碎片
            shufflePieces() {
                if (this.pieceData.length === 0) return;
                
                this.cells.forEach(cell => {
                    const piece = cell.querySelector('.puzzle-piece');
                    if (piece) piece.remove();
                    cell.style.border = '1px dashed #ccc';
                    cell.classList.remove('correct');
                });
                
                this.piecesContainer.innerHTML = '';
                const shuffled = [...this.pieceData].sort(() => Math.random() - 0.5);
                
                shuffled.forEach(piece => {
                    const pieceDiv = document.createElement('div');
                    pieceDiv.className = 'piece-item';
                    pieceDiv.style.backgroundImage = `url(${piece.dataURL})`;
                    pieceDiv.dataset.pieceId = piece.id;
                    pieceDiv.dataset.originalRow = piece.originalRow;
                    pieceDiv.dataset.originalCol = piece.originalCol;
                    pieceDiv.addEventListener('click', (e) => this.onPieceClick(e, pieceDiv));
                    this.bindDragEvents(pieceDiv);
                    this.piecesContainer.appendChild(pieceDiv);
                });
                
                this.moveCount = 0;
                this.gameState = 'playing';
                this.clearSelection();
                this.messageEl.textContent = '碎片已打乱，重新开始！';
            }
            
            // 自动完成
            solvePuzzle() {
                if (this.pieceData.length === 0) return;
                
                this.piecesContainer.innerHTML = '';
                
                for (let row = 0; row < this.gridSize; row++) {
                    for (let col = 0; col < this.gridSize; col++) {
                        const index = row * this.gridSize + col;
                        const cell = this.cells[index];
                        cell.innerHTML = '';
                        
                        const targetData = this.pieceData.find(p => p.originalRow === row && p.originalCol === col);
                        if (targetData) {
                            const piece = document.createElement('div');
                            piece.className = 'puzzle-piece';
                            piece.style.backgroundImage = `url(${targetData.dataURL})`;
                            piece.dataset.originalRow = row;
                            piece.dataset.originalCol = col;
                            cell.appendChild(piece);
                            cell.style.border = 'none';
                            cell.classList.add('correct');
                        }
                    }
                }
                
                this.gameState = 'completed';
                this.stopTimer();
                this.showComplete();
            }
            
            // 检查完成度
            checkCompletion() {
                if (!this.cells.length) return;
                
                let correctCount = 0;
                
                this.cells.forEach(cell => {
                    const piece = cell.querySelector('.puzzle-piece');
                    if (piece) {
                        const cellRow = parseInt(cell.dataset.row);
                        const cellCol = parseInt(cell.dataset.col);
                        const originalRow = parseInt(piece.dataset.originalRow);
                        const originalCol = parseInt(piece.dataset.originalCol);
                        const isRotated = piece.dataset.rotated === 'true';
                        
                        if (originalRow === cellRow && originalCol === cellCol && !isRotated) {
                            cell.classList.add('correct');
                            correctCount++;
                        } else {
                            cell.classList.remove('correct');
                        }
                    }
                });
                
                // 检查隐藏碎片
                this.checkHiddenPieces();
                
                if (correctCount === this.cells.length && this.gameState === 'playing') {
                    this.gameState = 'completed';
                    this.stopTimer();
                    this.showComplete();
                }
            }
            
            checkHiddenPieces() {
                if (!this.modifiers.hidden) return;
                
                let correctCount = 0;
                this.cells.forEach(cell => {
                    const piece = cell.querySelector('.puzzle-piece');
                    if (piece && piece.dataset.rotated !== 'true') {
                        const cellRow = parseInt(cell.dataset.row);
                        const cellCol = parseInt(cell.dataset.col);
                        if (parseInt(piece.dataset.originalRow) === cellRow && 
                            parseInt(piece.dataset.originalCol) === cellCol) {
                            correctCount++;
                        }
                    }
                });
                
                const totalVisible = this.pieceData.length - this.hiddenPieces.length;
                if (correctCount >= totalVisible - 1) {
                    const hiddenItems = this.piecesContainer.querySelectorAll('[data-hidden="true"]');
                    hiddenItems.forEach(item => {
                        item.style.display = '';
                        item.dataset.hidden = 'false';
                    });
                    if (hiddenItems.length > 0) {
                        this.messageEl.textContent = '👻 隐藏碎片出现了！';
                    }
                }
            }
            
            // 捣蛋鬼
            scheduleTrickster() {
                const delay = Math.random() * 15000 + 10000;
                setTimeout(() => {
                    if (this.gameState === 'playing' && !this.tricksterTriggered) {
                        this.triggerTrickster();
                    }
                }, delay);
            }
            
            async triggerTrickster() {
                this.tricksterTriggered = true;
                const count = this.gridSize >= 6 ? 5 : Math.floor(Math.random() * 3) + 1;
                
                const placedPieces = [];
                this.cells.forEach((cell, idx) => {
                    const piece = cell.querySelector('.puzzle-piece');
                    if (piece) placedPieces.push({ piece, cellIndex: idx });
                });
                
                if (placedPieces.length < 2) return;
                
                this.gameState = 'trickster';
                this.messageEl.textContent = '😈 捣蛋鬼来啦！';
                
                const toMove = this.getRandomIndices(placedPieces.length, Math.min(count, placedPieces.length));
                
                for (const idx of toMove) {
                    const { piece, cellIndex } = placedPieces[idx];
                    const targetIndex = Math.floor(Math.random() * this.cells.length);
                    if (targetIndex !== cellIndex) {
                        const targetPiece = this.cells[targetIndex].querySelector('.puzzle-piece');
                        if (targetPiece) {
                            this.cells[cellIndex].appendChild(targetPiece);
                        }
                        this.cells[targetIndex].appendChild(piece);
                    }
                }
                
                await new Promise(r => setTimeout(r, 300));
                this.gameState = 'playing';
                this.messageEl.textContent = '游戏继续！';
                this.checkCompletion();
            }
            
            showComplete() {
                const elapsed = Date.now() - this.startTime;
                const minutes = Math.floor(elapsed / 60000);
                const seconds = Math.floor((elapsed % 60000) / 1000);
                document.getElementById('completeTime').textContent = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                document.getElementById('completeSteps').textContent = this.moveCount;
                
                setTimeout(() => {
                    showPage('pageComplete');
                    // 首次完成游戏自动展示问卷
                    if (!localStorage.getItem('surveyShown')) {
                        localStorage.setItem('surveyShown', 'true');
                        setTimeout(() => {
                            document.getElementById('surveyModal').classList.add('active');
                        }, 800);
                    }
                }, 500);
            }
            
            startTimer() {
                this.startTime = Date.now();
                clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    // 手机版不显示计时器，但仍然计时
                }, 1000);
            }
            
            stopTimer() {
                clearInterval(this.timerInterval);
            }
        }

        // ==================== 音乐播放控制 ====================
        class MusicPlayer {
            constructor() {
                this.btn = document.getElementById('musicBtn');
                this.panel = document.getElementById('musicPanel');
                this.overlay = document.getElementById('musicOverlay');
                this.isOpen = false;

                // 本地播放器元素
                this.audio = document.getElementById('audioPlayer');
                this.playPauseBtn = document.getElementById('playPauseBtn');
                this.prevBtn = document.getElementById('prevBtn');
                this.nextBtn = document.getElementById('nextBtn');
                this.seekBackBtn = document.getElementById('seekBackBtn');
                this.seekForwardBtn = document.getElementById('seekForwardBtn');
                this.progressBar = document.getElementById('progressBar');
                this.progressFill = document.getElementById('progressFill');
                this.currentTimeEl = document.getElementById('currentTime');
                this.totalTimeEl = document.getElementById('totalTime');
                this.songNameEl = document.getElementById('songName');
                this.playlistEl = document.getElementById('playlist');
                this.togglePlaylistBtn = document.getElementById('togglePlaylist');
                
                // 播放列表
                this.playlist = [
                    { name: 'III - Athletics', file: 'music/III-田径(III - Athletics)_爱给网_aigei_com.mp3' },
                    { name: '爱乐之城·主题音乐', file: 'music/刘子源 - 爱乐之城·主题音乐 (钢琴连弹)_EG.flac' }
                ];
                this.currentIndex = 0;
                this.isPlaying = false;
                
                this.initPlayer();
                this.initEvents();
            }
            
            initPlayer() {
                // 渲染播放列表
                this.renderPlaylist();
                
                // 加载第一首歌
                this.loadSong(0);
                
                // 音频事件
                this.audio.addEventListener('timeupdate', () => this.updateProgress());
                this.audio.addEventListener('ended', () => this.playNext());
                this.audio.addEventListener('loadedmetadata', () => {
                    this.totalTimeEl.textContent = this.formatTime(this.audio.duration);
                });
            }
            
            initEvents() {
                this.btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggle();
                });

                this.overlay.addEventListener('click', () => this.close());
                
                // 播放/暂停
                this.playPauseBtn.addEventListener('click', () => this.togglePlay());
                
                // 上一首/下一首
                this.prevBtn.addEventListener('click', () => this.playPrev());
                this.nextBtn.addEventListener('click', () => this.playNext());
                
                // 快退/快进
                this.seekBackBtn.addEventListener('click', () => this.seek(-10));
                this.seekForwardBtn.addEventListener('click', () => this.seek(10));
                
                // 进度条点击
                this.progressBar.addEventListener('click', (e) => this.setProgress(e));
                
                // 播放列表切换
                this.togglePlaylistBtn.addEventListener('click', () => {
                    this.playlistEl.classList.toggle('active');
                });
            }
            
            renderPlaylist() {
                this.playlistEl.innerHTML = '';
                this.playlist.forEach((song, index) => {
                    const item = document.createElement('div');
                    item.className = 'playlist-item';
                    if (index === this.currentIndex) {
                        item.classList.add('active');
                    }
                    item.innerHTML = `<span class="index">${index + 1}</span><span>${song.name}</span>`;
                    item.addEventListener('click', () => {
                        this.loadSong(index);
                        this.play();
                    });
                    this.playlistEl.appendChild(item);
                });
            }
            
            loadSong(index) {
                this.currentIndex = index;
                const song = this.playlist[index];
                this.audio.src = song.file;
                this.songNameEl.textContent = song.name;
                this.updatePlaylistActive();
            }
            
            updatePlaylistActive() {
                const items = this.playlistEl.querySelectorAll('.playlist-item');
                items.forEach((item, index) => {
                    item.classList.toggle('active', index === this.currentIndex);
                });
            }
            
            togglePlay() {
                if (this.isPlaying) {
                    this.pause();
                } else {
                    this.play();
                }
            }
            
            play() {
                this.audio.play();
                this.isPlaying = true;
                this.playPauseBtn.textContent = '⏸️';
            }
            
            pause() {
                this.audio.pause();
                this.isPlaying = false;
                this.playPauseBtn.textContent = '▶️';
            }
            
            playNext() {
                this.currentIndex = (this.currentIndex + 1) % this.playlist.length;
                this.loadSong(this.currentIndex);
                this.play();
            }
            
            playPrev() {
                this.currentIndex = (this.currentIndex - 1 + this.playlist.length) % this.playlist.length;
                this.loadSong(this.currentIndex);
                this.play();
            }
            
            seek(seconds) {
                this.audio.currentTime = Math.max(0, Math.min(this.audio.duration, this.audio.currentTime + seconds));
            }
            
            setProgress(e) {
                const rect = this.progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                this.audio.currentTime = percent * this.audio.duration;
            }
            
            updateProgress() {
                const percent = (this.audio.currentTime / this.audio.duration) * 100 || 0;
                this.progressFill.style.width = percent + '%';
                this.currentTimeEl.textContent = this.formatTime(this.audio.currentTime);
            }
            
            formatTime(seconds) {
                if (isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            toggle() {
                if (this.isOpen) {
                    this.close();
                } else {
                    this.open();
                }
            }

            open() {
                this.isOpen = true;
                this.panel.classList.add('active');
                this.overlay.classList.add('active');
                this.btn.classList.add('active');
            }

            close() {
                this.isOpen = false;
                this.panel.classList.remove('active');
                this.overlay.classList.remove('active');
                this.btn.classList.remove('active');
            }
        }

        // ==================== 原图预览 ====================
        function initPreviewModal() {
            const previewBtn = document.getElementById('previewOriginalBtn');
            const previewModal = document.getElementById('previewModal');
            const previewImg = document.getElementById('previewModalImage');
            const closeBtn = document.getElementById('closePreview');
            
            previewBtn.addEventListener('click', () => {
                if (window.puzzleGame && window.puzzleGame.originalImage) {
                    previewImg.src = window.puzzleGame.originalImage.src;
                    previewModal.classList.add('active');
                } else {
                    alert('请先选择图片');
                }
            });
            
            closeBtn.addEventListener('click', () => {
                previewModal.classList.remove('active');
            });
            
            previewModal.addEventListener('click', (e) => {
                if (e.target === previewModal) {
                    previewModal.classList.remove('active');
                }
            });
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            window.puzzleGame = new PuzzleGame();
            window.tutorial = new Tutorial();
            window.musicPlayer = new MusicPlayer();
            initPreviewModal();
        });
    </script>
</body>
</html>
